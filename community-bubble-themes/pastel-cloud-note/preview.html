<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>粉蓝云边纸条主题预览</title>
  <link rel="stylesheet" href="./pastel-cloud-note.css?v=5" />
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: start center;
      padding: 18px;
      background: #16171b;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", "PingFang SC", sans-serif;
    }

    .phone-preview {
      width: min(430px, calc(100vw - 36px));
      height: 860px;
      max-height: calc(100vh - 36px);
      overflow: hidden;
      border-radius: 28px;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.42);
      border: 1px solid rgba(255, 255, 255, 0.12);
    }

    .sully-chat-container {
      position: relative;
      height: 100%;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sully-chat-header {
      display: flex;
      align-items: end;
      min-height: 92px;
      padding: 36px 16px 14px;
      flex-shrink: 0;
      position: sticky;
      top: 0;
      z-index: 30;
    }

    .header-row {
      display: flex;
      align-items: center;
      width: 100%;
      gap: 12px;
    }

    .icon-button {
      width: 36px;
      height: 36px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      border: 0;
      font-size: 18px;
    }

    .avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      flex: 0 0 auto;
      background:
        radial-gradient(circle at 36% 34%, #fff 0 11px, transparent 12px),
        radial-gradient(circle at 64% 34%, #fff 0 11px, transparent 12px),
        radial-gradient(circle at 50% 58%, #fff 0 18px, transparent 19px),
        linear-gradient(135deg, #d8ecff, #ffd8e9);
      border: 3px solid rgba(255, 255, 255, 0.86);
      box-shadow: 0 0 0 1px rgba(177, 190, 228, 0.52);
    }

    .avatar.user {
      background:
        radial-gradient(circle at 50% 44%, #f9f9ff 0 18px, transparent 19px),
        linear-gradient(135deg, #e9e5ff, #ffd6e4);
    }

    .title-wrap {
      min-width: 0;
      flex: 1;
    }

    .font-bold {
      font-weight: 700;
    }

    .text-slate-800 {
      color: #1f2937;
    }

    .text-slate-500 {
      color: #64748b;
    }

    .text-slate-400 {
      color: #94a3b8;
    }

    .messages {
      position: relative;
      z-index: 1;
      flex: 1;
      overflow-y: auto;
      padding: 28px 16px 24px;
    }

    .sully-msg-timestamp {
      display: flex;
      justify-content: center;
      margin: 0 0 24px;
      font-size: 11px;
    }

    .row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 24px;
    }

    .row.user {
      justify-content: flex-end;
    }

    .bubble-wrap {
      max-width: 72%;
    }

    .sully-bubble-ai,
    .sully-bubble-user {
      padding: 9px 15px;
      white-space: pre-wrap;
      min-height: 38px;
    }

    .leading-relaxed {
      line-height: 1.6;
      overflow-wrap: break-word;
    }

    .sully-voice-bubble {
      min-width: 164px;
      min-height: 40px;
      padding: 9px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .voice-bars {
      display: flex;
      align-items: end;
      gap: 3px;
      height: 16px;
    }

    .voice-bars span {
      width: 3px;
      border-radius: 999px;
      background: currentColor;
    }

    .voice-bars span:nth-child(1) { height: 8px; }
    .voice-bars span:nth-child(2) { height: 15px; }
    .voice-bars span:nth-child(3) { height: 11px; }

    .sully-system-pill,
    .sully-interaction-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 11px;
    }

    .center {
      display: flex;
      justify-content: center;
      margin: 18px 0 24px;
    }

    .sully-card-container,
    .sully-transfer-card {
      width: 230px;
      padding: 14px;
      font-size: 13px;
    }

    .sully-image-msg {
      width: 178px;
      height: 178px;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 48% 36%, #fff 0 30px, transparent 31px),
        radial-gradient(circle at 42% 54%, #fff 0 22px, transparent 23px),
        radial-gradient(circle at 58% 54%, #fff 0 22px, transparent 23px),
        linear-gradient(135deg, #eef7ff, #ffe2ef);
      color: #8c8da1;
      font-size: 18px;
    }

    .sully-chat-input {
      flex-shrink: 0;
      position: relative;
      z-index: 40;
      padding: 12px 14px 16px;
    }

    .input-row {
      display: flex;
      align-items: center;
      gap: 9px;
    }

    .sully-chat-input textarea {
      flex: 1;
      min-height: 40px;
      resize: none;
      border-radius: 20px;
      padding: 9px 12px;
      font: inherit;
      outline: none;
    }

    .send-button {
      width: 68px;
      height: 42px;
      border-radius: 18px;
      border: 0;
      font-size: 16px;
    }

    @media (max-width: 420px) {
      .messages {
        padding-inline: 13px;
      }

      .bubble-wrap {
        max-width: 74%;
      }
    }
  </style>
</head>
<body>
  <main class="phone-preview">
    <section class="sully-chat-container">
      <header class="sully-chat-header">
        <div class="header-row">
          <button class="icon-button" aria-label="返回">‹</button>
          <div class="avatar"></div>
          <div class="title-wrap">
            <div class="font-bold text-slate-800">云边纸条</div>
            <div class="text-slate-400" style="font-size: 11px;">Online · 低饱和贴纸气泡</div>
          </div>
          <button class="icon-button" aria-label="更多">≡</button>
        </div>
      </header>

      <div class="messages flex-1 overflow-y-auto">
        <div class="sully-msg-timestamp"><span>星期日 下午 3:36</span></div>

        <div class="row user">
          <div class="bubble-wrap">
            <div class="sully-bubble-user">
              <div class="leading-relaxed">让我接住你</div>
            </div>
          </div>
          <div class="avatar user"></div>
        </div>

        <div class="row user">
          <div class="bubble-wrap">
            <div class="sully-bubble-user">
              <div class="leading-relaxed">我接不住，一起跳！</div>
            </div>
          </div>
          <div class="avatar user"></div>
        </div>

        <div class="center">
          <div class="sully-system-pill">云边贴纸测试</div>
        </div>

        <div class="row ai">
          <div class="avatar"></div>
          <div class="bubble-wrap">
            <div class="sully-bubble-ai">
              <div class="leading-relaxed">这种不是靠背景赢，是气泡自己就像一张小纸条，边缘亮亮的。</div>
            </div>
          </div>
        </div>

        <div class="row user">
          <div class="bubble-wrap">
            <div class="sully-voice-bubble">
              <div class="voice-bars"><span></span><span></span><span></span></div>
              <div style="margin-left: auto; font-size: 12px;">0:08</div>
            </div>
          </div>
          <div class="avatar user"></div>
        </div>

        <div class="row ai">
          <div class="avatar"></div>
          <div class="bubble-wrap">
            <div class="sully-image-msg">图片消息</div>
          </div>
        </div>

        <div class="center">
          <div class="sully-interaction-pill">轻轻戳了戳</div>
        </div>

        <div class="row user">
          <div class="bubble-wrap">
            <div class="sully-bubble-user">
              <div class="leading-relaxed">长一点也要稳：反重力死了……谷歌我要和你拼了反重力怎么也会死</div>
            </div>
          </div>
          <div class="avatar user"></div>
        </div>

        <div class="row ai">
          <div class="avatar"></div>
          <div class="bubble-wrap">
            <div class="sully-card-container">
              <div class="font-bold text-slate-800">卡片消息</div>
              <div class="text-slate-500" style="margin-top: 6px; line-height: 1.6;">卡片也保持白纸条和浅紫描边。</div>
            </div>
          </div>
        </div>

        <div class="row user">
          <div class="bubble-wrap">
            <div class="sully-transfer-card">
              <div class="font-bold">转账卡片</div>
              <div style="font-size: 26px; margin-top: 8px;">¥52.00</div>
            </div>
          </div>
          <div class="avatar user"></div>
        </div>
      </div>

      <footer class="sully-chat-input">
        <div class="input-row">
          <button class="icon-button">＋</button>
          <textarea placeholder="写点什么"></textarea>
          <button class="send-button">发送</button>
        </div>
      </footer>
    </section>
  </main>
</body>
</html>
